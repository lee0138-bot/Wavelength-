<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wavelength - Update in Progress</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0b0f19 0%, #111827 100%);
            color: #f8fafc;
            overflow: hidden;
            position: relative;
        }
        /* Glowing background accents */
        .glow-green {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.12) 0%, rgba(0,0,0,0) 70%);
            top: -10%;
            left: -10%;
            z-index: 1;
        }
        .glow-pink {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.12) 0%, rgba(0,0,0,0) 70%);
            bottom: -10%;
            right: -10%;
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 2;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 550px;
            width: 90%;
            text-align: center;
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 3s infinite ease-in-out;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(to right, #10b981, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }
        p {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        p strong {
            color: #10b981; /* Green accent for emphasis */
        }
        .release-box {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.05) 0%, rgba(236, 72, 153, 0.05) 100%);
            border: 1px solid rgba(236, 72, 153, 0.3);
            padding: 25px;
            border-radius: 16px;
            box-shadow: inset 0 0 15px rgba(236, 72, 153, 0.05);
        }
        .release-box span {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ec4899; /* Pink label */
            font-weight: 700;
            margin-bottom: 8px;
        }
        .date-highlight {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.4); /* Green glow around version */
            margin-bottom: 5px;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>
    <div class="glow-green"></div>
    <div class="glow-pink"></div>
    
    <div class="container">
        <div class="icon">💚</div>
        <h1>Wavelength</h1>
        <p>Wavelength is currently <strong>being updated</strong> to bring you a much better experience. Please wait!</p>
        
        <div class="release-box">
            <span>Next Generation</span>
            <div class="date-highlight">Wavelength 2.0</div>
            <p style="margin: 5px 0 0 0; font-size: 1.05rem; color: #e2e8f0;">Releasing on June 10th at 5:00 PM</p>
        </div>
    </div>
</body>
</html>
